<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Modelos 3D</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: #1e293b;
            padding: 25px 0;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .header {
            padding: 0 25px 25px 25px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #f8fafc;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 15px;
        }

        .nav-item {
            padding: 14px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
        }

        .nav-item:hover {
            background-color: #334155;
            transform: translateX(5px);
        }

        .nav-item.active {
            background-color: #3b82f6;
            color: #ffffff;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .nav-item.active:hover {
            transform: none;
        }

        .viewer-container {
            flex: 1;
            position: relative;
            background-color: #000000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">Modelos 3D</div>
        <ul class="nav-list">
            <li class="nav-item active" data-src="examples/webgl_loader_fbx_Dancing_Twerk.html">
                Dancing Twerk
            </li>
            <li class="nav-item" data-src="examples/webgl_loader_fbx_Drunk_Walk.html">
                Drunk Walk
            </li>
            <li class="nav-item" data-src="examples/webgl_loader_fbx_Flair.html">
                Flair
            </li>
            <li class="nav-item" data-src="examples/webgl_loader_fbx_Salsa_Dancing.html">
                Salsa Dancing
            </li>
            <li class="nav-item" data-src="examples/webgl_loader_fbx_Standing_Clap.html">
                Standing Clap
            </li>
        </ul>
    </div>

    <div class="viewer-container">
        <iframe id="modelFrame" src="examples/webgl_loader_fbx_Dancing_Twerk.html"></iframe>
    </div>

    <script>
        const navItems = document.querySelectorAll('.nav-item');
        const modelFrame = document.getElementById('modelFrame');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                
                item.classList.add('active');
                
                modelFrame.src = item.getAttribute('data-src');
            });
        });
    </script>
</body>
</html>
